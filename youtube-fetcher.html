<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🍑YouTube動画取得ツール</title>

  <link rel="icon" type="image/png" href="favicon.png">

  
  <style>
    body { font-family: sans-serif; padding: 40px; background: #fffaf3; }
    h1 { color: #ff7f3f; }
    button { padding: 12px 24px; margin: 8px 8px 8px 0; font-size: 16px; border-radius: 8px; cursor: pointer; }
    input, select { padding: 8px; font-size: 16px; margin: 6px 0; }
    textarea { width: 100%; height: 300px; font-size: 14px; margin-top: 16px; }
    label { display: block; margin-top: 12px; font-size: 16px; }
    .box { background: #fff; padding: 16px; border-radius: 12px; margin-top: 24px; border: 1px solid #ffd7bd; }
    .preview { background: #fffaf3; padding: 12px; border-radius: 8px; margin-top: 12px; white-space: pre-wrap; }
    .member-grid { display: grid; grid-template-columns: repeat(2, 160px); gap: 8px 16px; margin-top: 12px; }
    .member-grid label { margin-top: 0; }

    .manual-item {
  background: #fffaf3;
  border: 1px solid #ffd7bd;
  border-radius: 8px;
  padding: 12px;
  margin: 10px 0;
}

.manual-item button {
  padding: 6px 12px;
  font-size: 14px;
}

    
  </style>
</head>
<body>
  <h1>🍑YouTube動画取得ツール</h1>

  <p>取得期間</p>
  <input id="startDate" type="date" value="2026-01-01">
  〜
  <input id="endDate" type="date" value="2026-07-01">

  <p>出力形式</p>
  <select id="format" onchange="renderOutputs()">
    <option value="tsv">TSV（スプシ用）</option>
    <option value="csv">CSV</option>
    <option value="js">videos.js</option>
  </select>

  <label><input id="excludeShorts" type="checkbox" checked> ショート動画を除く</label>

  <label>
    判定秒数：
    <input id="shortLimit" type="number" value="60" min="1" style="width:80px;">
    秒以下を除外
  </label>

  <br>
  <button onclick="fetchVideos()">取得</button>
  <button onclick="copyOutput()">コピー</button>

  <p id="status"></p>

  <h2 id="outputTitle">TSV</h2>
  <textarea id="output" placeholder="ここに出力されます"></textarea>

  <h2>除外したショート候補</h2>
  <textarea id="excludedOutput" placeholder="ここに除外した動画が出ます"></textarea>

  <div class="box">
    <h2>🍑 手動追加（相互コラボ・企業案件用）</h2>

    <p>YouTube URL</p>
    <input id="manualUrl" type="text" style="width:90%;" placeholder="https://www.youtube.com/watch?v=...">

    <br>
    <button onclick="previewManualVideo()">動画情報を確認</button>

    <div id="manualPreview" class="preview">ここにプレビューが出ます</div>

    <p>members</p>
    <button type="button" onclick="checkAllMembers()">全員</button>
    <button type="button" onclick="clearAllMembers()">全解除</button>

    <div class="member-grid">
      <label><input type="checkbox" id="member_じゃぱぱ">じゃぱぱ</label>
      <label><input type="checkbox" id="member_のあ">のあ</label>
      <label><input type="checkbox" id="member_たっつん">たっつん</label>
      <label><input type="checkbox" id="member_ゆあん">ゆあん</label>
      <label><input type="checkbox" id="member_シヴァ">シヴァ</label>
      <label><input type="checkbox" id="member_どぬく">どぬく</label>
      <label><input type="checkbox" id="member_うり">うり</label>
      <label><input type="checkbox" id="member_えと">えと</label>
      <label><input type="checkbox" id="member_ヒロ">ヒロ</label>
      <label><input type="checkbox" id="member_なおきり">なおきり</label>
      <label><input type="checkbox" id="member_もふ">もふ</label>
      <label><input type="checkbox" id="member_るな">るな</label>
    </div>

    <p>series</p>
    <input id="manualSeries" type="text" style="width:90%;" placeholder="例：ポケモンコラボ">

    <p>collab</p>
<button type="button" onclick="checkAllCollabs()">全選択</button>
<button type="button" onclick="clearAllCollabs()">全解除</button>

<div class="member-grid">
  <label><input type="checkbox" id="collab_ドズル社" value="ドズル社">ドズル社</label>
  <label><input type="checkbox" id="collab_いんく" value="いんく">いんく</label>
  <label><input type="checkbox" id="collab_ぷちひなフレンズ" value="ぷちひなフレンズ">ぷちひなフレンズ</label>
  <label><input type="checkbox" id="collab_TAMAchan" value="TAMAchan">TAMAchan</label>
  <label><input type="checkbox" id="collab_ポケモン公式" value="ポケモン公式">ポケモン公式</label>
  <label><input type="checkbox" id="collab_日常組" value="日常組">日常組</label>
  <label><input type="checkbox" id="collab_さんちゃんく！" value="さんちゃんく！">さんちゃんく！</label>
  <label><input type="checkbox" id="collab_主役は我々だ！" value="主役は我々だ！">主役は我々だ！</label>
  <label><input type="checkbox" id="collab_まいぜんシスターズ" value="まいぜんシスターズ">まいぜんシスターズ</label>
</div>

<input
  id="manualCollabOther"
  type="text"
  style="width:90%;"
  placeholder="その他のコラボ先を入力（複数は「|」で区切る）"
>
    <br><br>
    <button onclick="addManualVideo()">この動画を追加</button>
  </div>

  <div class="box">
  <h2>追加済み動画一覧</h2>
  <div id="manualVideoList">まだ追加した動画はありません。</div>
</div>

  <div class="box">
    <h2>追加した動画プレビュー</h2>
    <textarea id="addedPreviewOutput" placeholder="手動追加した動画がここに表示されます"></textarea>
  </div>

  <script>
    const API_KEY = "AIzaSyD23XKOxHYUN0v_mHGZQFWi3_I6uFNO4lk";
    const CHANNEL_ID = "UCh7bThzNArch6TgoHB1HVhA";

    let currentVideos = [];
    let currentExcludedVideos = [];
    let manualPreviewVideo = null;
    let manuallyAddedVideos = [];
    let editingManualIndex = null;

    const memberOrder = [
      "じゃぱぱ", "のあ", "たっつん", "ゆあん",
      "シヴァ", "どぬく", "うり", "えと",
      "ヒロ", "なおきり", "もふ", "るな"
    ];

    function decodeHtml(text) {
      let decoded = text;
      for (let i = 0; i < 5; i++) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = decoded;
        const next = textarea.value;
        if (next === decoded) break;
        decoded = next;
      }
      return decoded;
    }

    function parseDuration(duration) {
      if (!duration) return 0;
      const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!match) return 0;
      return Number(match[1] || 0) * 3600 + Number(match[2] || 0) * 60 + Number(match[3] || 0);
    }

    function formatSeconds(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return min === 0 ? `${sec}秒` : `${min}分${sec}秒`;
    }

    function formatDuration(seconds) {
  if (!seconds) return "";

  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  if (h > 0) {
    return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }

  return `${m}:${String(s).padStart(2, "0")}`;
}
    
    function formatArray(text) {
  if (!text || String(text).trim() === "" || String(text).trim() === "-") {
    return [];
  }

  return String(text)
    .split(/[、,・|]/)
    .map(item => item.trim())
    .filter(item => item !== "");
}

    function extractVideoId(url) {
      try {
        const u = new URL(url);

        if (u.hostname.includes("youtu.be")) {
          return u.pathname.replace("/", "");
        }

        if (u.searchParams.get("v")) {
          return u.searchParams.get("v");
        }

        const shortsMatch = u.pathname.match(/\/shorts\/([^/?]+)/);
        if (shortsMatch) {
          return shortsMatch[1];
        }

        return "";
      } catch {
        return "";
      }
    }

    async function fetchVideoDetails(videoIds) {
      const details = {};

      for (let i = 0; i < videoIds.length; i += 50) {
        const chunk = videoIds.slice(i, i + 50);

        const url =
          "https://www.googleapis.com/youtube/v3/videos" +
          "?part=snippet,contentDetails" +
          "&id=" + encodeURIComponent(chunk.join(",")) +
          "&key=" + encodeURIComponent(API_KEY);

        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        data.items.forEach(item => {
          details[item.id] = {
            title: decodeHtml(item.snippet.title),
            date: item.snippet.publishedAt.slice(0, 10),
            durationSeconds: parseDuration(item.contentDetails.duration)
          };
        });
      }

      return details;
    }

    async function fetchVideos() {
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const excludeShorts = document.getElementById("excludeShorts").checked;
      const shortLimit = Number(document.getElementById("shortLimit").value) || 60;
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const excludedOutput = document.getElementById("excludedOutput");

      status.textContent = "取得中...";
      output.value = "";
      excludedOutput.value = "";

      let allItems = [];
      let pageToken = "";

      try {
        do {
          const url =
            "https://www.googleapis.com/youtube/v3/search" +
            "?part=snippet" +
            "&channelId=" + encodeURIComponent(CHANNEL_ID) +
            "&type=video" +
            "&order=date" +
            "&maxResults=50" +
            "&publishedAfter=" + startDate + "T00:00:00Z" +
            "&publishedBefore=" + endDate + "T00:00:00Z" +
            "&key=" + encodeURIComponent(API_KEY) +
            (pageToken ? "&pageToken=" + pageToken : "");

          const res = await fetch(url);
          const data = await res.json();

          if (data.error) {
            status.textContent = "エラー: " + data.error.message;
            return;
          }

          allItems = allItems.concat(data.items || []);
          pageToken = data.nextPageToken || "";
        } while (pageToken);

        status.textContent = "動画の長さを確認中...";

        const videoIds = allItems.map(item => item.id.videoId);
        const details = await fetchVideoDetails(videoIds);

        let videos = allItems.map(item => ({
          title: details[item.id.videoId]?.title || decodeHtml(item.snippet.title),
          type: "動画",
          members: "",
          series: "",
          collab: [],
          videoId: item.id.videoId,
          date: details[item.id.videoId]?.date || item.snippet.publishedAt.slice(0, 10),
          durationSeconds: details[item.id.videoId]?.durationSeconds || 0
        }));

        videos.sort((a, b) => a.date.localeCompare(b.date));

        let excludedVideos = [];

        if (excludeShorts) {
          excludedVideos = videos.filter(v => v.durationSeconds <= shortLimit);
          excludedVideos.sort((a, b) => a.date.localeCompare(b.date));
          videos = videos.filter(v => v.durationSeconds > shortLimit);
        }

        currentVideos = videos.concat(manuallyAddedVideos);
        currentVideos.sort((a, b) => a.date.localeCompare(b.date));
        currentExcludedVideos = excludedVideos;

        renderOutputs();

        if (excludeShorts) {
          status.textContent = `${currentVideos.length}件取得できたよ！(${shortLimit}秒以下を${currentExcludedVideos.length}件除外したよ。)`;
        } else {
          status.textContent = `${currentVideos.length}件取得できたよ！`;
        }
      } catch (error) {
        console.error(error);
        status.textContent = "取得に失敗しました: " + error.message;
      }
    }

   function makeRows(videos) {
  const rows = [["title", "type", "members", "series", "collab", "videoId", "date", "duration"]];

  videos.forEach(v => {
    rows.push([
      v.title,
      v.type,
      v.members,
      v.series,
      formatCollabText(v.collab),
      v.videoId,
      v.date,
      formatDuration(v.durationSeconds)
    ]);
  });

  return rows;
}

    function renderOutputs() {
      const format = document.getElementById("format").value;
      const output = document.getElementById("output");
      const excludedOutput = document.getElementById("excludedOutput");
      const outputTitle = document.getElementById("outputTitle");

      const rows = makeRows(currentVideos);
      let text = "";

      if (format === "tsv") {
        outputTitle.textContent = "TSV（スプシ用）";
        text = rows.map(row => row.map(value => String(value).replaceAll("\t", " ")).join("\t")).join("\n");
      }

      if (format === "csv") {
        outputTitle.textContent = "CSV";
        text = rows.map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(",")).join("\n");
      }
if (format === "js") {
  outputTitle.textContent = "videos.js";

  const jsData = currentVideos.map(v => {
    const membersArray = String(v.members || "")
      .split("|")
      .map(name => name.trim())
      .filter(name => name !== "");

return `  {
  title: ${JSON.stringify(v.title)},
  type: ${JSON.stringify(v.type)},
  members: ${JSON.stringify(membersArray)},
  series: ${JSON.stringify(v.series || "")},
  collab: ${JSON.stringify(Array.isArray(v.collab) ? v.collab : formatArray(v.collab))},
  videoId: ${JSON.stringify(v.videoId)},
  url: ${JSON.stringify("https://www.youtube.com/watch?v=" + v.videoId)},
  date: ${JSON.stringify(v.date)},
  duration: ${JSON.stringify(formatDuration(v.durationSeconds))}
}`;
  });

  text = "const videos = [\n" + jsData.join(",\n") + "\n];";
}
      output.value = text;

      if (currentExcludedVideos.length > 0) {
        const excludedRows = [["title", "videoId", "date", "duration"]];

        currentExcludedVideos.forEach(v => {
          excludedRows.push([v.title, v.videoId, v.date, formatSeconds(v.durationSeconds)]);
        });

        excludedOutput.value = excludedRows.map(row =>
          row.map(value => String(value).replaceAll("\t", " ")).join("\t")
        ).join("\n");
      } else {
        excludedOutput.value = "除外した動画はありません。";
      }

      renderAddedPreview();
      renderManualVideoList();
}

function renderManualVideoList() {
  const list = document.getElementById("manualVideoList");

  if (manuallyAddedVideos.length === 0) {
    list.textContent = "まだ追加した動画はありません。";
    return;
  }

  list.innerHTML = "";

  manuallyAddedVideos.forEach((v, index) => {
    const div = document.createElement("div");
    div.className = "manual-item";

    div.innerHTML = `
      <strong>${index + 1}. ${v.title}</strong><br>
      公開日：${v.date}<br>
      members：${v.members || "未入力"}<br>
      series：${v.series || "未入力"}<br>
      collab：${formatCollabText(v.collab) || "未入力"}<br>
      videoId：${v.videoId}<br><br>
      <button onclick="editManualVideo(${index})">編集</button>
      <button onclick="deleteManualVideo(${index})">削除</button>
    `;

    list.appendChild(div);
  });
}

function editManualVideo(index) {
  const video = manuallyAddedVideos[index];

  editingManualIndex = index;
  manualPreviewVideo = { ...video };

  document.getElementById("manualUrl").value = video.url || "";
  document.getElementById("manualSeries").value = video.series || "";
  document.getElementById("manualCollabOther").value = "";

  document.querySelectorAll('[id^="member_"]').forEach(cb => {
    cb.checked = false;
  });

  const members = Array.isArray(video.members)
    ? video.members
    : String(video.members || "").split("|");

  members.forEach(name => {
    const cb = document.getElementById("member_" + name.trim());
    if (cb) cb.checked = true;
  });

  document.querySelectorAll('[id^="collab_"]').forEach(cb => {
    cb.checked = false;
  });

  const collabs = Array.isArray(video.collab)
    ? video.collab
    : formatArray(video.collab);

  collabs.forEach(name => {
    const cb = document.getElementById("collab_" + name);

    if (cb) {
      cb.checked = true;
    } else {
      const other = document.getElementById("manualCollabOther");
      other.value += (other.value ? "|" : "") + name;
    }
  });

  document.getElementById("manualPreview").textContent =
    "編集中：\n" +
    "タイトル：" + video.title + "\n" +
    "公開日：" + video.date;
}
      function deleteManualVideo(index) {
  const target = manuallyAddedVideos[index];

  if (!target) return;

  const ok = confirm(`この動画を削除する？\n${target.title}`);

  if (!ok) return;

  manuallyAddedVideos.splice(index, 1);
  currentVideos = currentVideos.filter(v => v.videoId !== target.videoId);

  renderOutputs();
}

    function renderAddedPreview() {
      const addedPreviewOutput = document.getElementById("addedPreviewOutput");

      if (manuallyAddedVideos.length === 0) {
        addedPreviewOutput.value = "まだ手動追加した動画はありません。";
        return;
      }

      const rows = [["title", "members", "series", "collab", "videoId", "date"]];

      manuallyAddedVideos.forEach(v => {
        rows.push([
  v.title,
  v.members,
  v.series,
  formatCollabText(v.collab),
  v.videoId,
  v.date
]);

});
      
      addedPreviewOutput.value = rows.map(row =>
        row.map(value => String(value).replaceAll("\t", " ")).join("\t")
      ).join("\n");
    }

    async function previewManualVideo() {
      const url = document.getElementById("manualUrl").value.trim();
      const preview = document.getElementById("manualPreview");
      const videoId = extractVideoId(url);

      manualPreviewVideo = null;

      if (!videoId) {
        preview.textContent = "動画URLからvideoIdを取得できませんでした。URLを確認してね。";
        return;
      }

      preview.textContent = "動画情報を確認中...";

      try {
        const details = await fetchVideoDetails([videoId]);
        const info = details[videoId];

        if (!info) {
          preview.textContent = "動画情報が取得できませんでした。URLや公開状態を確認してね。";
          return;
        }

        manualPreviewVideo = {
          title: info.title,
          type: "動画",
          members: "",
          series: "",
          collab: [],
          videoId: videoId,
          date: info.date,
          durationSeconds: info.durationSeconds
        };

        preview.textContent =
          `タイトル：${manualPreviewVideo.title}\n` +
          `videoId：${manualPreviewVideo.videoId}\n` +
          `公開日：${manualPreviewVideo.date}\n` +
          `長さ：${formatSeconds(manualPreviewVideo.durationSeconds)}`;
      } catch (error) {
        console.error(error);
        preview.textContent = "動画情報の取得に失敗しました: " + error.message;
      }
    }

    function getSelectedMembers() {
      return memberOrder
        .filter(name => document.getElementById("member_" + name).checked)
        .join("|");
    }

   function getSelectedCollab() {
  const selected = [...document.querySelectorAll('[id^="collab_"]:checked')]
    .map(cb => cb.value);

  const otherText = document.getElementById("manualCollabOther").value.trim();
  const others = formatArray(otherText);

  return [...selected, ...others];
}

    function addManualVideo() {
  const preview = document.getElementById("manualPreview");

  if (!manualPreviewVideo) {
    preview.textContent = "先に「動画情報を確認」を押してね。";
    return;
  }

  const isEdit = editingManualIndex !== null;

  const addedVideo = {
    ...manualPreviewVideo,
    members: getSelectedMembers(),
    series: document.getElementById("manualSeries").value.trim(),
    collab: getSelectedCollab()
  };

  const alreadyExists = manuallyAddedVideos.some((v, index) => {
    if (isEdit && index === editingManualIndex) {
      return false;
    }
    return v.videoId === addedVideo.videoId;
  });

  if (alreadyExists) {
    preview.textContent = "この動画はすでに追加されています。";
    return;
  }

  if (isEdit) {
    const oldVideoId = manuallyAddedVideos[editingManualIndex].videoId;

    manuallyAddedVideos[editingManualIndex] = addedVideo;
    manuallyAddedVideos.sort((a, b) => a.date.localeCompare(b.date));

    currentVideos = currentVideos.filter(v => v.videoId !== oldVideoId);
    currentVideos.push(addedVideo);
    currentVideos.sort((a, b) => a.date.localeCompare(b.date));

    editingManualIndex = null;
  } else {
    manuallyAddedVideos.push(addedVideo);
    manuallyAddedVideos.sort((a, b) => a.date.localeCompare(b.date));

    currentVideos.push(addedVideo);
    currentVideos.sort((a, b) => a.date.localeCompare(b.date));
  }

  renderOutputs();

  preview.textContent =
    `${isEdit ? "更新しました！" : "追加しました！"}\n` +
    `タイトル：${addedVideo.title}\n` +
    `公開日：${addedVideo.date}\n` +
    `members：${addedVideo.members || "未入力"}\n` +
    `series：${addedVideo.series || "未入力"}\n` +
    `collab：${formatCollabText(addedVideo.collab) || "未入力"}`;

  clearManualForm();
      
}

    function formatCollabText(collab) {
  if (Array.isArray(collab)) {
    return collab.length ? collab.join("、") : "";
  }

  return collab || "";
}

    
    function clearManualForm() {
    document.querySelectorAll('[id^="member_"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('[id^="collab_"]').forEach(cb => cb.checked = false);

    document.getElementById("manualSeries").value = "";
    document.getElementById("manualCollabOther").value = "";
    document.getElementById("manualUrl").value = "";

    manualPreviewVideo = null;
}

    function checkAllMembers() {
      document.querySelectorAll('[id^="member_"]').forEach(cb => cb.checked = true);
    }

    function clearAllMembers() {
      document.querySelectorAll('[id^="member_"]').forEach(cb => cb.checked = false);
    }

    function copyOutput() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      alert("コピーしたよ！");
    }

    renderAddedPreview();
    renderManualVideoList();

  function checkAllCollabs() {
    document.querySelectorAll('[id^="collab_"]').forEach(cb => cb.checked = true);
}

function clearAllCollabs() {
    document.querySelectorAll('[id^="collab_"]').forEach(cb => cb.checked = false);
}

    
  </script>
</body>
</html>
