<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>⏱️ duration追記ツール | ぴちペディア</title>

  <link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  font-family: sans-serif;
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
  background: #fffaf3;
}

h1 {
  color: #ff8c42;
}

textarea {
  width: 100%;
  height: 320px;
  font-family: monospace;
  font-size: 14px;
  margin-top: 10px;
}

button {
  padding: 12px 24px;
  margin: 10px 8px 10px 0;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 15px;
  box-sizing: border-box;
}

.box {
  background: white;
  border: 1px solid #ffd7bd;
  border-radius: 12px;
  padding: 16px;
  margin-top: 20px;
}

#status {
  font-weight: bold;
  color: #666;
}
</style>
</head>

<body>

<h1>⏱️ duration追記ツール</h1>

<div class="box">
  <p>YouTube APIキー</p>
  <input id="apiKey" type="text" placeholder="APIキーを入力">
</div>

<div class="box">
  <p>今の videos.js を貼り付け</p>
  <textarea id="input" placeholder="const videos = [...] を貼り付け"></textarea>

  <button onclick="addDurations()">durationを追記</button>
  <button onclick="copyOutput()">コピー</button>

  <p id="status"></p>
</div>

<div class="box">
  <p>duration追加後の videos.js</p>
  <textarea id="output" placeholder="ここに出力されます"></textarea>
</div>

<script>
function parseDuration(duration) {
  if (!duration) return 0;

  const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!match) return 0;

  return Number(match[1] || 0) * 3600 +
         Number(match[2] || 0) * 60 +
         Number(match[3] || 0);
}

function formatDuration(seconds) {
  if (!seconds) return "";

  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  if (h > 0) {
    return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }

  return `${m}:${String(s).padStart(2, "0")}`;
}
  
  function cleanVideoId(id) {
  return String(id || "")
    .replace(/"/g, "")
    .trim();
}

async function fetchDurations(videoIds, apiKey) {
  const result = {};

  for (let i = 0; i < videoIds.length; i += 50) {
    const chunk = videoIds.slice(i, i + 50);

    const url =
      "https://www.googleapis.com/youtube/v3/videos" +
      "?part=contentDetails" +
      "&id=" + encodeURIComponent(chunk.join(",")) +
      "&key=" + encodeURIComponent(apiKey);

    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message);
    }

    data.items.forEach(item => {
      const seconds = parseDuration(item.contentDetails.duration);
      result[item.id] = formatDuration(seconds);
    });
  }

  return result;
}

function objectToJS(obj) {
  const lines = [];

  lines.push("  {");
  lines.push(`    title: ${JSON.stringify(obj.title)},`);
  lines.push(`    type: ${JSON.stringify(obj.type)},`);
  lines.push(`    members: ${JSON.stringify(obj.members || [])},`);
  lines.push(`    series: ${JSON.stringify(obj.series || "")},`);
  lines.push(`    collab: ${JSON.stringify(obj.collab || [])},`);
  lines.push(`    videoId: ${JSON.stringify(obj.videoId)},`);
  lines.push(`    url: ${JSON.stringify(obj.url || "https://www.youtube.com/watch?v=" + obj.videoId)},`);
  lines.push(`    date: ${JSON.stringify(obj.date || "")},`);
  lines.push(`    duration: ${JSON.stringify(obj.duration || "")}`);
  lines.push("  }");

  return lines.join("\n");
}

async function addDurations() {
  const apiKey = document.getElementById("apiKey").value.trim();
  const input = document.getElementById("input").value.trim();
  const output = document.getElementById("output");
  const status = document.getElementById("status");

  if (!apiKey) {
    alert("APIキーを入力してね");
    return;
  }

  if (!input) {
    alert("videos.js を貼り付けてね");
    return;
  }

  try {
    status.textContent = "videos.js を読み込み中...";

const start = input.indexOf("[");
const end = input.lastIndexOf("]");

const code = input.substring(start, end + 1);

    const videos = Function(`"use strict"; return (${code});`)();

    const targets = videos.filter(video =>
      video.videoId &&
      (!video.duration || video.duration.trim() === "")
    );

    if (targets.length === 0) {
      status.textContent = "duration未設定の動画はありません。";
      output.value = input;
      return;
    }

    status.textContent = `${targets.length}件のdurationを取得中...`;

    const durationMap = await fetchDurations(
     targets.map(video => cleanVideoId(video.videoId)),
      apiKey
    );

    videos.forEach(video => {
      const cleanId = cleanVideoId(video.videoId);

if (!video.duration && durationMap[cleanId]) {
  video.duration = durationMap[cleanId];
}
    });

    const js =
      "const videos = [\n" +
      videos.map(objectToJS).join(",\n") +
      "\n];";

    output.value = js;

    status.textContent =
      `完了！${targets.length}件のdurationを確認しました。`;
  } catch (error) {
    console.error(error);
    status.textContent = "エラー：" + error.message;
  }
}

function copyOutput() {
  const output = document.getElementById("output");

  if (!output.value.trim()) {
    alert("コピーする内容がありません");
    return;
  }

  output.select();
  document.execCommand("copy");
  alert("コピーしたよ！");
}
</script>

</body>
</html>
